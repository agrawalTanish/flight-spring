version: '3.8'

services:
  flightdb:
    image: mysql:8.0
    container_name: flightdb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flightdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  flight-service:
    build:
      context: ./flight-service
      dockerfile: Dockerfile
    container_name: flight-service
    ports:
      - "8080:8080"
    environment:
      DB_HOST: flightdb
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      flightdb:
        condition: service_healthy

  flight-app:
    build:
      context: ./flight-app
      dockerfile: Dockerfile
    container_name: flight-app
    ports:
      - "80:80"
    depends_on:
      - flight-service

volumes:
  mysql-data:
